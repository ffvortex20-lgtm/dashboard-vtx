<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | MASTER ADMIN FULL</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
            authDomain: "vortexdev2.firebaseapp.com",
            databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
            projectId: "vortexdev2",
            storageBucket: "vortexdev2.firebasestorage.app",
            appId: "1:755839099190:android:f97e6d0dc860177306d397"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- NAVEGAÇÃO ---
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        function init() {
            // Monitorar Clientes
            onValue(ref(db, 'KeysUsers'), (snapshot) => {
                const list = document.getElementById('userTable');
                list.innerHTML = "";
                let ativos = 0;
                snapshot.forEach((child) => {
                    const data = child.val();
                    if(data.status === "ativada") ativos++;
                    list.innerHTML += `
                        <tr>
                            <td><b>${data.key}</b></td>
                            <td><span class="status ${data.status}">${data.status}</span></td>
                            <td>${data.validade} D</td>
                            <td class="uid-col">${data.uid}</td>
                            <td class="actions">
                                <button onclick="upStat('KeysUsers/${child.key}','ativada')">Ativar</button>
                                <button class="ban" onclick="upStat('KeysUsers/${child.key}','banido')">Banir</button>
                                <button class="del" onclick="deleteItem('KeysUsers/${child.key}')">X</button>
                            </td>
                        </tr>`;
                });
                document.getElementById('count-ativos').innerText = ativos;
            });

            // Monitorar Revendedores
            onValue(ref(db, 'Resellers'), (snapshot) => {
                const list = document.getElementById('resellerTable');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    const resId = child.key;
                    list.innerHTML += `
                        <tr>
                            <td><b>${data.user}</b></td>
                            <td><code id="pass-${resId}">${data.pass}</code></td>
                            <td><b style="color:#00ff88">${data.credits}</b></td>
                            <td class="actions">
                                <button onclick="addCredit('${resId}', ${data.credits})">+ Créditos</button>
                                <button onclick="resetPass('${resId}')">Reset Senha</button>
                                <button class="del" onclick="deleteItem('Resellers/${resId}', 'Deseja excluir este revendedor?')">Excluir</button>
                            </td>
                        </tr>`;
                });
            });
        }

        // --- FUNÇÕES MASTER ---
        window.upStat = (path, s) => update(ref(db, path), { status: s });

        window.deleteItem = (path, msg = "Deseja excluir permanentemente?") => {
            if(confirm(msg)) remove(ref(db, path));
        };

        window.resetPass = (resId) => {
            const novaSenha = prompt("Digite a nova senha para este revendedor:");
            if(novaSenha) {
                update(ref(db, `Resellers/${resId}`), { pass: novaSenha })
                .then(() => alert("Senha alterada com sucesso!"));
            }
        };

        window.addCredit = (resId, current) => {
            const qtd = prompt("Quantos créditos deseja ADICIONAR?");
            if(qtd && !isNaN(qtd)) {
                update(ref(db, `Resellers/${resId}`), { credits: parseInt(current) + parseInt(qtd) });
            }
        };

        window.criarRevendedor = () => {
            const user = document.getElementById('res_user').value;
            const pass = document.getElementById('res_pass').value;
            const cred = document.getElementById('res_cred').value || "0";
            if(!user || !pass) return alert("Usuário e Senha são obrigatórios!");
            
            set(ref(db, `Resellers/${user}`), {
                user: user, 
                pass: pass, 
                credits: parseInt(cred)
            }).then(() => {
                alert("Revendedor cadastrado!");
                document.getElementById('res_user').value = "";
                document.getElementById('res_pass').value = "";
            });
        };

        window.gerarKeyMaster = () => {
            const prefix = document.getElementById('k_prefix').value || "VTX";
            const dias = document.getElementById('k_dias').value || "30";
            const novaKey = `${prefix}-${Math.floor(1000 + Math.random() * 9999)}`;
            set(ref(db, `KeysUsers/KEY-${Date.now()}`), {
                key: novaKey, status: "ativada", uid: "AGUARDANDO", validade: dias, device: "Painel Master"
            });
            alert("Key Master Gerada: " + novaKey);
        };

        init();
    </script>

    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        aside { width: 240px; background: #000; border-right: 1px solid #1a1a1a; padding: 25px; flex-shrink: 0; }
        .logo { color: #00ccff; font-weight: bold; text-align: center; font-size: 1.3rem; margin-bottom: 30px; border-bottom: 1px solid #1a1a1a; padding-bottom: 15px; }
        .nav-link { display: block; padding: 12px; color: #666; text-decoration: none; cursor: pointer; border-radius: 8px; margin-bottom: 8px; font-weight: bold; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: #111; color: #00ccff; }
        main { flex-grow: 1; padding: 30px; overflow-y: auto; background: #080808; }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .stats { display: flex; gap: 20px; margin-bottom: 25px; }
        .card { background: #111; padding: 20px; border-radius: 12px; flex: 1; border-bottom: 3px solid #00ccff; }
        .card b { font-size: 1.8rem; color: #00ccff; display: block; }
        .table-container { background: #111; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a1a1a; padding: 15px; text-align: left; color: #444; font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }
        .status.ativada { color: #00ff88; }
        .status.banido { color: #ff4444; }
        .actions { display: flex; gap: 5px; }
        .actions button { padding: 6px 10px; background: #000; border: 1px solid #333; color: #eee; cursor: pointer; border-radius: 4px; font-size: 0.7rem; }
        .actions .del { background: #ff4444; border: none; color: white; }
        .box { background: #111; padding: 25px; border-radius: 15px; max-width: 450px; border: 1px solid #1a1a1a; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #222; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: #00ccff; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; }
        code { background: #222; padding: 2px 6px; border-radius: 4px; color: #ffbb00; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<aside>
    <div class="logo">VORTEX MASTER</div>
    <a class="nav-link active" onclick="showTab('tab-clientes')">👥 Clientes</a>
    <a class="nav-link" onclick="showTab('tab-resellers')">🤝 Revendedores</a>
    <a class="nav-link" onclick="showTab('tab-gerar')">🔑 Gerar Key Master</a>
</aside>

<main>
    <div id="tab-clientes" class="tab-content" style="display:block">
        <div class="stats">
            <div class="card"><span>Usuários Ativos</span><b id="count-ativos">0</b></div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Key</th><th>Status</th><th>Validade</th><th>Device</th><th>Ações</th></tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-resellers" class="tab-content">
        <div class="box">
            <h3>Cadastrar Novo Revendedor</h3>
            <input type="text" id="res_user" placeholder="Login (ex: revenda01)">
            <input type="text" id="res_pass" placeholder="Senha de acesso">
            <input type="number" id="res_cred" placeholder="Créditos (Keys)">
            <button class="btn-main" onclick="criarRevendedor()">CRIAR CONTA REVENDA</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Login</th><th>Senha</th><th>Créditos</th><th>Ações Administrativas</th></tr>
                </thead>
                <tbody id="resellerTable"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-gerar" class="tab-content">
        <div class="box">
            <h3>Gerar Acesso Direto</h3>
            <label>Prefixo da Key</label>
            <input type="text" id="k_prefix" placeholder="Ex: ADM">
            <label>Dias</label>
            <input type="number" id="k_dias" value="30">
            <button class="btn-main" onclick="gerarKeyMaster()">GERAR E SALVAR</button>
        </div>
    </div>
</main>

</body>
</html>
