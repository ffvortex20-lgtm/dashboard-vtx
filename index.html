<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | ULTRA MASTER ADMIN</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
            authDomain: "vortexdev2.firebaseapp.com",
            databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
            projectId: "vortexdev2",
            storageBucket: "vortexdev2.firebasestorage.app",
            appId: "1:755839099190:android:f97e6d0dc860177306d397"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- NAVEGAÇÃO ---
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        function init() {
            // MONITORAR CLIENTES & DASHBOARD
            onValue(ref(db, 'KeysUsers'), (snapshot) => {
                const list = document.getElementById('userTable');
                list.innerHTML = "";
                let ativos = 0, banidos = 0;

                snapshot.forEach((child) => {
                    const data = child.val();
                    const id = child.key;
                    if(data.status === "ativada") ativos++;
                    if(data.status === "banido") banidos++;

                    list.innerHTML += `
                        <tr>
                            <td><b>${data.key || '---'}</b></td>
                            <td><span class="status ${data.status}">${data.status}</span></td>
                            <td>${data.validade || '1'} Dias</td>
                            <td class="uid-col">${data.uid || 'Nenhum'}</td>
                            <td class="actions">
                                <button onclick="upStat('KeysUsers/${id}','ativada')">Ativar</button>
                                <button onclick="upStat('KeysUsers/${id}','pausada')">Pausar</button>
                                <button class="ban" onclick="upStat('KeysUsers/${id}','banido')">Banir</button>
                                <button class="reset" onclick="resetHWID('${id}')">Reset</button>
                                <button class="del" onclick="deleteData('KeysUsers/${id}')">Remover</button>
                            </td>
                        </tr>`;
                });
                document.getElementById('count-ativos').innerText = ativos;
                document.getElementById('count-banidos').innerText = banidos;
            });

            // MONITORAR REVENDEDORES
            onValue(ref(db, 'Resellers'), (snapshot) => {
                const list = document.getElementById('resellerTable');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    const resId = child.key;
                    list.innerHTML += `
                        <tr>
                            <td><b>${data.user}</b></td>
                            <td><code>${data.pass}</code></td>
                            <td><b style="color:#00ccff">${data.credits || 0}</b></td>
                            <td class="actions">
                                <button onclick="addCredit('${resId}', ${data.credits || 0})">+ Créditos</button>
                                <button onclick="resetResPass('${resId}')">Reset Senha</button>
                                <button class="del" onclick="deleteData('Resellers/${resId}')">Excluir</button>
                            </td>
                        </tr>`;
                });
            });
        }

        // --- FUNÇÕES DE CONTROLE ---
        window.upStat = (path, s) => update(ref(db, path), { status: s });
        window.resetHWID = (id) => update(ref(db, `KeysUsers/${id}`), { uid: "RESETADO", device: "Limpo pelo ADM" });
        window.deleteData = (path) => confirm("Excluir permanentemente?") && remove(ref(db, path));

        // GERENCIAR REVENDEDORES
        window.criarRevendedor = () => {
            const user = document.getElementById('res_user').value;
            const pass = document.getElementById('res_pass').value;
            const cred = document.getElementById('res_cred').value || "0";
            if(!user || !pass) return alert("Preencha Login e Senha!");
            set(ref(db, `Resellers/${user}`), { user, pass, credits: parseInt(cred) });
            alert("Revendedor Criado!");
        };

        window.addCredit = (id, atual) => {
            const qtd = prompt("Adicionar quantos créditos?");
            if(qtd) update(ref(db, `Resellers/${id}`), { credits: atual + parseInt(qtd) });
        };

        window.resetResPass = (id) => {
            const nova = prompt("Nova senha:");
            if(nova) update(ref(db, `Resellers/${id}`), { pass: nova });
        };

        // GERAR KEY MASTER
        window.gerarKeyMaster = () => {
            const prefix = document.getElementById('k_prefix').value || "VTX";
            const dias = document.getElementById('k_dias').value || "30";
            const novaKey = `${prefix}-${Math.floor(1000 + Math.random() * 9000)}`;
            set(ref(db, `KeysUsers/KEY-${Date.now()}`), {
                key: novaKey, status: "ativada", uid: "AGUARDANDO", validade: dias, device: "Painel Master"
            });
            alert("Key Gerada: " + novaKey);
        };

        // SISTEMA DE UPDATE
        window.enviarUpdate = () => {
            const upData = {
                title: document.getElementById('up_t').value,
                desc: document.getElementById('up_d').value,
                ver: document.getElementById('up_v').value,
                link: document.getElementById('up_l').value
            };
            set(ref(db, 'update'), upData).then(() => alert("Update publicado!"));
        };

        init();
    </script>

    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        aside { width: 240px; background: #000; border-right: 1px solid #1a1a1a; padding: 25px; flex-shrink: 0; }
        .logo { color: #00ccff; font-weight: bold; text-align: center; font-size: 1.4rem; margin-bottom: 30px; border-bottom: 1px solid #1a1a1a; padding-bottom: 15px; }
        .nav-link { display: block; padding: 12px; color: #666; text-decoration: none; cursor: pointer; border-radius: 8px; margin-bottom: 8px; font-weight: bold; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: #111; color: #00ccff; }
        main { flex-grow: 1; padding: 30px; overflow-y: auto; background: #080808; }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .stats { display: flex; gap: 20px; margin-bottom: 25px; }
        .card { background: #111; padding: 20px; border-radius: 12px; flex: 1; border-bottom: 3px solid #00ccff; }
        .card b { font-size: 1.8rem; color: #00ccff; display: block; }
        .table-container { background: #111; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a1a1a; padding: 15px; text-align: left; color: #444; font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }
        .uid-col { color: #444; font-family: monospace; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .status.ativada { color: #00ff88; }
        .status.banido { color: #ff4444; }
        .actions { display: flex; gap: 5px; }
        .actions button { padding: 5px 8px; background: #000; border: 1px solid #333; color: #bbb; cursor: pointer; border-radius: 4px; font-size: 0.7rem; }
        .actions .ban { color: #ff4444; }
        .actions .reset { color: #00ff88; }
        .actions .del { background: #ff4444; color: #fff; border: none; }
        .box { background: #111; padding: 25px; border-radius: 15px; max-width: 450px; border: 1px solid #1a1a1a; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #222; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: #00ccff; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<aside>
    <div class="logo">VORTEX MASTER</div>
    <a class="nav-link active" onclick="showTab('tab-clientes')">👥 Clientes</a>
    <a class="nav-link" onclick="showTab('tab-resellers')">🤝 Revendedores</a>
    <a class="nav-link" onclick="showTab('tab-gerar')">🔑 Gerar Keys</a>
    <a class="nav-link" onclick="showTab('tab-up')">🚀 Sistema Update</a>
</aside>

<main>
    <div id="tab-clientes" class="tab-content" style="display:block">
        <div class="stats">
            <div class="card"><span>Ativos</span><b id="count-ativos">0</b></div>
            <div class="card"><span>Banidos</span><b id="count-banidos">0</b></div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Chave</th><th>Status</th><th>Validade</th><th>Dispositivo</th><th>Ações</th></tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-resellers" class="tab-content">
        <div class="box">
            <h3>Criar Revendedor</h3>
            <input type="text" id="res_user" placeholder="Login">
            <input type="text" id="res_pass" placeholder="Senha">
            <input type="number" id="res_cred" placeholder="Créditos Iniciais">
            <button class="btn-main" onclick="criarRevendedor()">CRIAR CONTA</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Login</th><th>Senha</th><th>Créditos</th><th>Ações</th></tr>
                </thead>
                <tbody id="resellerTable"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-gerar" class="tab-content">
        <div class="box">
            <h3>Gerar Nova Credencial</h3>
            <input type="text" id="k_prefix" placeholder="Prefixo (Ex: MASTER)">
            <input type="number" id="k_dias" value="30">
            <button class="btn-main" onclick="gerarKeyMaster()">GERAR E SALVAR</button>
        </div>
    </div>

    <div id="tab-up" class="tab-content">
        <div class="box">
            <h3>Update Remoto</h3>
            <input type="text" id="up_t" placeholder="Nome do App">
            <textarea id="up_d" placeholder="Notas da atualização..."></textarea>
            <input type="text" id="up_v" placeholder="Versão (Ex: 1.0)">
            <input type="text" id="up_l" placeholder="Link Direto">
            <button class="btn-main" onclick="enviarUpdate()">PUBLICAR AGORA</button>
        </div>
    </div>
</main>

</body>
</html>
