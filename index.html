<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | ULTRA ADMIN FULL</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Configurações do seu arquivo google-services (1).json
        const firebaseConfig = {
            apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
            authDomain: "vortexdev2.firebaseapp.com",
            databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
            projectId: "vortexdev2",
            storageBucket: "vortexdev2.firebasestorage.app",
            appId: "1:755839099190:android:f97e6d0dc860177306d397"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- NAVEGAÇÃO ENTRE ABAS ---
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // --- CARREGAR DADOS EM TEMPO REAL ---
        function init() {
            // Referência ao nó KeysUsers conforme suas regras do Firebase
            onValue(ref(db, 'KeysUsers'), (snapshot) => {
                const list = document.getElementById('userTable');
                list.innerHTML = "";
                let ativos = 0, banidos = 0;

                snapshot.forEach((child) => {
                    const data = child.val();
                    const id = child.key;
                    
                    // Contagem para o Dashboard
                    if(data.status === "ativada") ativos++;
                    if(data.status === "banido") banidos++;

                    // Mapeamento dos campos: device, dias, key, status, uid, validade
                    list.innerHTML += `
                        <tr>
                            <td><b>${data.key || 'Sem Key'}</b></td>
                            <td><span class="status ${data.status}">${data.status}</span></td>
                            <td>${data.validade || '1'} Dias</td>
                            <td class="uid-col">${data.uid || 'Nenhum'}</td>
                            <td class="actions">
                                <button onclick="upStat('${id}','ativada')">Ativar</button>
                                <button onclick="upStat('${id}','pausada')">Pausar</button>
                                <button class="ban" onclick="upStat('${id}','banido')">Banir</button>
                                <button class="reset" onclick="resetHWID('${id}')">Reset</button>
                                <button class="del" onclick="delKey('${id}')">Remover</button>
                            </td>
                        </tr>`;
                });
                document.getElementById('count-ativos').innerText = ativos;
                document.getElementById('count-banidos').innerText = banidos;
            });
        }

        // --- FUNÇÕES DE GERENCIAMENTO ---
        window.upStat = (id, s) => update(ref(db, `KeysUsers/${id}`), { status: s });
        window.resetHWID = (id) => update(ref(db, `KeysUsers/${id}`), { uid: "RESETADO", device: "Dispositivo Limpo pelo ADM" });
        window.delKey = (id) => confirm("Deseja excluir permanentemente?") && remove(ref(db, `KeysUsers/${id}`));

        // GERAR KEY COM DIAS PERSONALIZADOS
        window.gerarKeyCliente = () => {
            const prefix = document.getElementById('k_prefix').value || "VTX";
            const dias = document.getElementById('k_dias').value || "30";
            const novaKey = `${prefix}-${Math.floor(1000 + Math.random() * 9000)}`;
            const id = "KEY-" + Date.now();
            
            set(ref(db, `KeysUsers/${id}`), {
                key: novaKey, 
                status: "ativada", 
                uid: "AGUARDANDO LOGIN", 
                validade: dias, 
                dias: Date.now().toString(), // Timestamp de criação
                device: "Criada via Painel Administrativo",
                dispositivos: "1"
            });
            alert("Sucesso!\nKey: " + novaKey + "\nValidade: " + dias + " dias");
        };

        // SISTEMA DE UPDATE (Ajustado para o nó "update" das suas regras)
        window.enviarUpdate = () => {
            const upData = {
                title: document.getElementById('up_t').value,
                desc: document.getElementById('up_d').value,
                ver: document.getElementById('up_v').value,
                link: document.getElementById('up_l').value
            };
            set(ref(db, 'update'), upData).then(() => alert("Atualização publicada com sucesso!"));
        };

        init();
    </script>

    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Menu Lateral Estável */
        aside { width: 240px; background: #000; border-right: 1px solid #1a1a1a; padding: 25px; flex-shrink: 0; display: flex; flex-direction: column; }
        .logo { color: #00ccff; font-weight: bold; text-align: center; font-size: 1.4rem; margin-bottom: 40px; letter-spacing: 1px; border-bottom: 1px solid #1a1a1a; padding-bottom: 15px; }
        .nav-link { display: block; padding: 14px; color: #666; text-decoration: none; cursor: pointer; border-radius: 8px; margin-bottom: 8px; font-weight: bold; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: #111; color: #00ccff; }

        /* Área de Conteúdo */
        main { flex-grow: 1; padding: 40px; overflow-y: auto; background: #080808; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Cards */
        .stats { display: flex; gap: 20px; margin-bottom: 35px; }
        .card { background: #111; padding: 25px; border-radius: 12px; flex: 1; border-bottom: 3px solid #00ccff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card span { color: #555; font-size: 0.9rem; text-transform: uppercase; font-weight: bold; }
        .card b { font-size: 2.2rem; color: #00ccff; display: block; margin-top: 5px; }

        /* Tabela Profissional */
        .table-container { background: #111; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a1a1a; padding: 18px; text-align: left; color: #444; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 15px 18px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; }
        .uid-col { color: #444; font-size: 0.75rem; font-family: 'Courier New', Courier, monospace; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Status Badges */
        .status { padding: 4px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .status.ativada { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
        .status.pausada { background: rgba(255, 187, 0, 0.1); color: #ffbb00; }
        .status.banido { background: rgba(255, 68, 68, 0.1); color: #ff4444; }

        /* Botões de Ação */
        .actions { display: flex; gap: 6px; }
        .actions button { padding: 6px 10px; border: 1px solid #333; background: #000; color: #bbb; cursor: pointer; border-radius: 5px; font-size: 0.7rem; transition: 0.2s; }
        .actions button:hover { border-color: #00ccff; color: #00ccff; }
        .actions .ban { color: #ff4444; }
        .actions .reset { color: #00ff88; }
        .actions .del { background: #ff4444; color: #fff; border: none; padding: 6px 12px; }

        /* Formulários */
        .box { background: #111; padding: 35px; border-radius: 15px; max-width: 500px; border: 1px solid #1a1a1a; }
        .box h3 { margin-top: 0; color: #00ccff; margin-bottom: 25px; }
        label { font-size: 0.8rem; color: #555; display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 14px; margin-bottom: 20px; background: #000; border: 1px solid #222; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 0.9rem; }
        input:focus { border-color: #00ccff; outline: none; }
        .btn-main { background: #00ccff; color: #000; border: none; padding: 16px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 1rem; transition: 0.3s; }
        .btn-main:hover { background: #0099cc; transform: translateY(-2px); }
    </style>
</head>
<body>

<aside>
    <div class="logo">VORTEX CORE</div>
    <a class="nav-link active" onclick="showTab('tab-clientes')">👥 Clientes & Dash</a>
    <a class="nav-link" onclick="showTab('tab-gerar')">🔑 Gerar Acesso</a>
    <a class="nav-link" onclick="showTab('tab-up')">🚀 Sistema Update</a>
</aside>

<main>
    <div id="tab-clientes" class="tab-content" style="display:block">
        <div class="stats">
            <div class="card"><span>Usuários Ativos</span><b id="count-ativos">0</b></div>
            <div class="card"><span>Contas Banidas</span><b id="count-banidos">0</b></div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Chave de Acesso</th>
                        <th>Status</th>
                        <th>Validade</th>
                        <th>ID Dispositivo</th>
                        <th>Ações Administrativas</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-gerar" class="tab-content">
        <div class="box">
            <h3>Gerar Nova Credencial</h3>
            <label>Prefixo da Key (Ex: VORTEX-PRO)</label>
            <input type="text" id="k_prefix" placeholder="Digite o prefixo...">
            
            <label>Dias de Validade (Tempo de acesso)</label>
            <input type="number" id="k_dias" value="30" min="1">
            
            <button class="btn-main" onclick="gerarKeyCliente()">CRIAR E SALVAR NO FIREBASE</button>
        </div>
    </div>

    <div id="tab-up" class="tab-content">
        <div class="box">
            <h3>Gerenciar Atualização Remota</h3>
            <label>Nome da Atualização</label>
            <input type="text" id="up_t" placeholder="Ex: Vortex Mod Menu">
            
            <label>Notas da Versão (O que há de novo?)</label>
            <textarea id="up_d" placeholder="Descreva as mudanças..." rows="4"></textarea>
            
            <label>Versão Atual</label>
            <input type="text" id="up_v" placeholder="Ex: 1.0.9">
            
            <label>Link Direto para Download</label>
            <input type="text" id="up_l" placeholder="https://...">
            
            <button class="btn-main" onclick="enviarUpdate()">PUBLICAR PARA USUÁRIOS</button>
        </div>
    </div>
</main>

</body>
</html>
