<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | ULTRA MASTER ADMIN</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
            authDomain: "vortexdev2.firebaseapp.com",
            databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
            projectId: "vortexdev2",
            storageBucket: "vortexdev2.firebasestorage.app",
            appId: "1:755839099190:android:f97e6d0dc860177306d397"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // NAVEGAÇÃO
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
        };

        function init() {
            // MONITOR CLIENTES
            onValue(ref(db, 'KeysUsers'), (snapshot) => {
                const list = document.getElementById('userTable');
                list.innerHTML = "";
                let ativos = 0, banidos = 0, total = 0;

                snapshot.forEach((child) => {
                    const data = child.val();
                    total++;
                    if(data.status === "ativada") ativos++;
                    if(data.status === "banido") banidos++;

                    // Ajuste de leitura para aceitar 'dias' ou 'validade' e tratar o símbolo infinito
                    const displayDias = data.dias || data.validade || '1';
                    const displayDisp = data.dispositivos || '1';

                    list.innerHTML += `
                        <tr>
                            <td><span class="badge-key">${data.key || '---'}</span></td>
                            <td><span class="status-dot ${data.status}"></span> ${data.status}</td>
                            <td>${displayDias}${displayDias === '∞' ? '' : 'D'}</td>
                            <td><small>${displayDisp}</small></td>
                            <td class="uid-col" title="${data.uid}">${data.uid || 'Nenhum'}</td>
                            <td><small>${data.criadoPor || 'Admin'}</small></td>
                            <td class="actions">
                                <button class="btn-action green" title="Ativar" onclick="upStat('KeysUsers/${child.key}','ativada')">✔</button>
                                <button class="btn-action yellow" title="Reset HWID" onclick="resetHWID('${child.key}')">🔄</button>
                                <button class="btn-action red" title="Banir" onclick="upStat('KeysUsers/${child.key}','banido')">🚫</button>
                                <button class="btn-action del" title="Excluir" onclick="deleteData('KeysUsers/${child.key}')">🗑</button>
                            </td>
                        </tr>`;
                });
                document.getElementById('count-total').innerText = total;
                document.getElementById('count-ativos').innerText = ativos;
                document.getElementById('count-banidos').innerText = banidos;
            });

            // MONITOR REVENDAS (Igual ao anterior)
            onValue(ref(db, 'Resellers'), (snapshot) => {
                const list = document.getElementById('resellerTable');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    list.innerHTML += `
                        <tr>
                            <td><b>${data.user}</b></td>
                            <td><span class="pass-box">${data.pass}</span></td>
                            <td><b style="color:var(--neon-blue)">${data.credits || 0}</b></td>
                            <td class="actions">
                                <button class="btn-action blue" onclick="addCredit('${child.key}', ${data.credits || 0})">+ Créditos</button>
                                <button class="btn-action del" onclick="deleteData('Resellers/${child.key}')">Excluir</button>
                            </td>
                        </tr>`;
                });
            });
        }

        // FUNÇÕES ADMINISTRATIVAS
        window.upStat = (path, s) => update(ref(db, path), { status: s });
        window.resetHWID = (id) => update(ref(db, `KeysUsers/${id}`), { uid: "RESETADO", device: "" });
        window.deleteData = (path) => confirm("Excluir definitivamente?") && remove(ref(db, path));
        
        window.addCredit = (id, atual) => {
            const qtd = prompt("Adicionar quantos créditos?");
            if(qtd && !isNaN(qtd)) update(ref(db, `Resellers/${id}`), { credits: atual + parseInt(qtd) });
        };

        window.criarRevendedor = () => {
            const user = document.getElementById('res_user').value;
            const pass = document.getElementById('res_pass').value;
            const cred = document.getElementById('res_cred').value || "0";
            if(!user || !pass) return alert("Preencha Login e Senha!");
            set(ref(db, `Resellers/${user}`), { user, pass, credits: parseInt(cred) });
            alert("Revendedor Criado!");
        };

        // GERAR MASTER CORRIGIDO (Foto 2 e 3)
        window.gerarKeyMaster = () => {
            const prefix = document.getElementById('k_prefix').value || "VTX";
            const inputDias = document.getElementById('k_dias').value;
            
            // Se colocar 0, gera Ilimitado conforme suas fotos
            const finalDias = (inputDias === "0" || inputDias === "") ? "∞" : inputDias;
            const finalDisp = (inputDias === "0" || inputDias === "") ? "Livre" : "1";

            const randomNum = Math.floor(1000 + Math.random() * 9000);
            const novaKey = `${prefix}-${randomNum}`;
            
            set(ref(db, `KeysUsers/KEY-${Date.now()}`), {
                key: novaKey, 
                status: "ativada", 
                uid: "RESETADO", 
                dias: finalDias, 
                dispositivos: finalDisp,
                criadoPor: "ADMIN", 
                device: ""
            }).then(() => alert("Key Gerada: " + novaKey + " (" + finalDias + ")"));
        };

        window.enviarUpdate = () => {
            set(ref(db, 'update'), {
                title: document.getElementById('up_t').value,
                desc: document.getElementById('up_d').value,
                ver: document.getElementById('up_v').value,
                link: document.getElementById('up_l').value
            }).then(() => alert("Update Publicado!"));
        };

        init();
    </script>

    <style>
        :root {
            --neon-blue: #00d2ff; --neon-green: #00ff88; --neon-red: #ff3e3e;
            --bg-dark: #08080a; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
        }
        body {
            margin: 0; background: var(--bg-dark); color: #fff; font-family: 'Poppins', sans-serif;
            display: flex; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e, #08080a);
        }
        aside {
            width: 260px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border); padding: 30px 20px; display: flex; flex-direction: column;
        }
        .logo { font-size: 1.6rem; font-weight: 900; color: var(--neon-blue); text-align: center; margin-bottom: 40px; letter-spacing: 3px; }
        .nav-link {
            padding: 14px 18px; color: #888; text-decoration: none; cursor: pointer; border-radius: 12px;
            margin-bottom: 10px; transition: 0.3s; font-weight: 500;
        }
        .nav-link:hover, .nav-link.active { background: var(--glass); color: #fff; border: 1px solid var(--glass-border); }
        .music-player { margin-top: auto; border-radius: 15px; overflow: hidden; border: 1px solid var(--glass-border); }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .tab-content { display: none; animation: slideUp 0.4s ease forwards; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: var(--glass); border: 1px solid var(--glass-border); padding: 25px; border-radius: 20px; flex: 1; }
        .card b { font-size: 2.2rem; display: block; color: var(--neon-blue); }
        .table-container { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.02); padding: 18px; text-align: left; font-size: 0.75rem; color: #555; }
        td { padding: 15px 18px; border-bottom: 1px solid var(--glass-border); font-size: 0.9rem; }
        .badge-key { background: rgba(0,210,255,0.1); color: var(--neon-blue); padding: 4px 10px; border-radius: 8px; font-weight: bold; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-dot.ativada { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
        .status-dot.banido { background: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }
        .btn-action { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; padding: 8px; border-radius: 8px; cursor: pointer; }
        .btn-action.red:hover { background: var(--neon-red); }
        .btn-action.green:hover { background: var(--neon-green); }
        .btn-action.blue:hover { background: var(--neon-blue); }
        .box { background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--glass-border); max-width: 500px; }
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; border-radius: 12px; }
        .btn-main { background: linear-gradient(90deg, var(--neon-blue), #0082ff); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .uid-col { color: #444; font-family: monospace; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;900&display=swap" rel="stylesheet">
</head>
<body>

<aside>
    <div class="logo">VORTEX</div>
    <nav>
        <div class="nav-link active" onclick="showTab('tab-clientes')">👥 Clientes</div>
        <div class="nav-link" onclick="showTab('tab-resellers')">🤝 Revendedores</div>
        <div class="nav-link" onclick="showTab('tab-gerar')">🔑 Gerar Master</div>
        <div class="nav-link" onclick="showTab('tab-up')">🚀 Enviar Update</div>
    </nav>
    <div class="music-player">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGvPBcmU" width="100%" height="80" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
    </div>
</aside>

<main>
    <div id="tab-clientes" class="tab-content active">
        <div class="stats">
            <div class="card"><span>Total Keys</span><b id="count-total">0</b></div>
            <div class="card"><span>Ativos</span><b id="count-ativos">0</b></div>
            <div class="card"><span>Banidos</span><b id="count-banidos" style="color:var(--neon-red)">0</b></div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Chave</th><th>Status</th><th>Duração</th><th>Disp.</th><th>UID</th><th>Criado</th><th>Ações</th></tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-resellers" class="tab-content">
        <div class="box">
            <h3>Novo Revendedor</h3>
            <input type="text" id="res_user" placeholder="Login">
            <input type="text" id="res_pass" placeholder="Senha">
            <input type="number" id="res_cred" placeholder="Créditos Iniciais">
            <button class="btn-main" onclick="criarRevendedor()">CRIAR CONTA</button>
        </div>
        <br>
        <div class="table-container">
            <table>
                <thead><tr><th>Login</th><th>Senha</th><th>Saldo</th><th>Ações</th></tr></thead>
                <tbody id="resellerTable"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-gerar" class="tab-content">
        <div class="box">
            <h3>Gerador Master</h3>
            <p style="font-size: 0.8rem; color: #888;">(Coloque 0 dias para Key Ilimitada/Livre)</p>
            <input type="text" id="k_prefix" placeholder="Prefixo (Ex: MASTER)" value="VTX">
            <input type="number" id="k_dias" placeholder="Dias (0 = Ilimitado)" value="30">
            <button class="btn-main" onclick="gerarKeyMaster()">GERAR KEY AGORA</button>
        </div>
    </div>

    <div id="tab-up" class="tab-content">
        <div class="box">
            <h3>Lançar Update</h3>
            <input type="text" id="up_t" placeholder="Título">
            <textarea id="up_d" placeholder="Descrição"></textarea>
            <input type="text" id="up_v" placeholder="Versão">
            <input type="text" id="up_l" placeholder="Link Direto">
            <button class="btn-main" onclick="enviarUpdate()">PUBLICAR AGORA</button>
        </div>
    </div>
</main>

</body>
</html>
